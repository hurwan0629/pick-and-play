<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="icons/icon-192.png" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />

    <title>Pick Play</title>
</head>
<body>
    <h1>Pick Play</h1>
    <h3>게임 랜덤 뽑기</h3>
    <div id="selected-game">
        <img id="game-icon" alt="selected-icon"/>
        <h6 id="game-name"></h6>
        <p id="game-genre"></p>
        <p id="game-price"><span id="game-discount-rate"></span></p>
    </div>
    <button id="select-game">게임 뽑기</button>
    <button id="app-install-button" hidden>설치</button>
    <script src="app.js"></script>
</body>
</html>
